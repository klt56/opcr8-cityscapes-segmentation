# Build and deploy Python app (FastAPI) to Azure Web App - opcr8-api

name: Build and deploy Python app to Azure Web App - opcr8-api

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'src/**'
      - 'models/**'
      - '.github/workflows/main_opcr8-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout du code avec Git LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Créer l'environnement virtuel et installer les dépendances
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !app/
            !notebooks/
            !.git/
            !venv/
            !mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'opcr8-api'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_059AC04F61A549C3BF04A8B76778346E }}
        
